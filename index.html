<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KraziWigg</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #140022;
      border-bottom: 2px solid #39ff14;
    }

    .logo img {
      height: 45px;
      object-fit: contain;
    }

    .search {
      width: 40%;
    }

    .search input {
      width: 100%;
      padding: 8px;
      border-radius: 20px;
      border: none;
      background: #1f0033;
      color: white;
      outline: none;
      box-shadow: 0 0 8px #a020f0;
    }

    .upload-btn {
      background: linear-gradient(45deg, #39ff14, #a020f0);
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 10px #39ff14;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .video-card {
      background: #16002a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .video-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px #a020f0;
    }

    .video-card video {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .video-info {
      padding: 10px;
    }

    .video-title {
      font-size: 14px;
      font-weight: bold;
      color: #39ff14;
    }
  </style>
</head>

    <div class="search">
      <input type="text" placeholder="Search crazy videos..." />
    </div>

    <button class="upload-btn" onclick="uploadVideo()">Upload</button>
    <input type="file" id="fileInput" style="display:none" accept="video/*">
  </header>

  <main class="container" id="videoContainer"></main>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function uploadVideo() {
      const input = document.getElementById("fileInput");
      input.click();

      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;

        if (file.size > 50 * 1024 * 1024) {
          alert("Max 50MB for now");
          return;
        }

        const fileName = Date.now() + ".mp4";

        const { error } = await supabase.storage
          .from("videos")
          .upload(fileName, file);

        if (error) {
          alert("Upload failed");
          console.error(error);
          return;
        }

        const publicUrl = supabase.storage
          .from("videos")
          .getPublicUrl(fileName).data.publicUrl;

        await supabase.from("videos").insert({
          title: "New Video",
          url: publicUrl
        });

        loadVideos();
      };
    }

    async function loadVideos() {
      const { data } = await supabase
        .from("videos")
        .select("*")
        .order("id", { ascending: false });

      const container = document.getElementById("videoContainer");
      container.innerHTML = "";

      data.forEach(video => {
        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
          <video src="${video.url}" controls></video>
          <div class="video-info">
            <div class="video-title">${video.title}</div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    loadVideos();
  </script>
