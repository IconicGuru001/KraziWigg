<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KraziWigg</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #140022;
      border-bottom: 2px solid #39ff14;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 40px;
    }

    .logo span {
      font-size: 20px;
      font-weight: bold;
      color: #39ff14;
    }

    .search input {
      padding: 8px;
      border-radius: 20px;
      border: none;
      background: #1f0033;
      color: white;
    }

    .upload-btn {
      background: linear-gradient(45deg, #39ff14, #a020f0);
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .video-card {
      background: #16002a;
      border-radius: 12px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="KraziWigg Logo">
    <span>KraziWigg</span>
  </div>

  <input type="file" id="fileInput" accept="video/*"/>
  <button class="upload-btn" onclick="uploadVideo()">Upload</button>
</header>

<main class="container" id="videoContainer"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseClient = supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_ANON_KEY"
  );

  async function uploadVideo() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select a video");

    const fileName = Date.now() + ".mp4";

    const { error } = await supabaseClient.storage
      .from("videos")
      .upload(fileName, file);

    if (error) {
      alert("Upload failed");
      return;
    }

    loadVideos();
  }

  async function loadVideos() {
    const { data } = await supabaseClient.storage
      .from("videos")
      .list();

    const container = document.getElementById("videoContainer");
    container.innerHTML = "";

    data.forEach(file => {
      const { data: urlData } = supabaseClient.storage
        .from("videos")
        .getPublicUrl(file.name);

      const video = document.createElement("video");
      video.src = urlData.publicUrl;
      video.controls = true;

      container.appendChild(video);
    });
  }

  loadVideos();
</script>

</body>
</html>
