<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KraziWigg</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #140022;
      border-bottom: 2px solid #39ff14;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #39ff14;
      text-shadow: 0 0 10px #39ff14;
    }

    .search {
      width: 40%;
    }

    .search input {
      width: 100%;
      padding: 8px;
      border-radius: 20px;
      border: none;
      background: #1f0033;
      color: white;
      outline: none;
      box-shadow: 0 0 8px #a020f0;
    }

    .upload-btn {
      background: linear-gradient(45deg, #39ff14, #a020f0);
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 10px #39ff14;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .video-card {
      background: #16002a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .video-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px #a020f0;
    }

    .video-card video {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .video-info {
      padding: 10px;
    }

    .video-title {
      font-size: 14px;
      font-weight: bold;
      color: #39ff14;
    }

    .video-meta {
      font-size: 12px;
      color: #c084fc;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">KraziWigg</div>

    <div class="search">
      <input type="text" placeholder="Search crazy videos..." />
    </div>

    <button class="upload-btn">Upload</button>
  </header>

  <main class="container" id="videoContainer"></main>

  <script>
    const videos = [
      {
        title: "Crazy Trick Shot",
        src: "sample1.mp4",
        views: "1K views"
      },
      {
        title: "Funny Moments",
        src: "sample2.mp4",
        views: "3K views"
      }
    ];

    const container = document.getElementById("videoContainer");

    videos.forEach(video => {
      const card = document.createElement("div");
      card.className = "video-card";

      card.innerHTML = `
        <video src="${video.src}" controls></video>
        <div class="video-info">
          <div class="video-title">${video.title}</div>
          <div class="video-meta">${video.views}</div>
        </div>
      `;

      container.appendChild(card);
    });
  </script>

</body>
</html>
